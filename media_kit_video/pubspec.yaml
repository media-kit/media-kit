name: media_kit_video
description: Native implementation for video playback in package:media_kit.
homepage: https://github.com/media-kit/media-kit
repository: https://github.com/media-kit/media-kit
version: 2.0.1
environment:
  sdk: ^3.6.0
  flutter: ">=3.27.4"
resolution: workspace

topics:
  - video
  - video-player
  - audio
  - audio-player
  - cross-platform

dependencies:
  flutter:
    sdk: flutter

  media_kit: ^1.2.6

  plugin_platform_interface: ^2.1.8
  synchronized: ^3.3.0
  universal_platform: ^1.1.0
  wakelock_plus: ^1.3.0
  web: ^1.1.1

dev_dependencies:
  flutter_lints: any

flutter:
  plugin:
    platforms:
      windows:
        pluginClass: MediaKitVideoPluginCApi
      linux:
        pluginClass: MediaKitVideoPlugin
      macos:
        pluginClass: MediaKitVideoPlugin
      ios:
        pluginClass: MediaKitVideoPlugin
      android:
        package: com.alexmercerind.media_kit_video
        pluginClass: MediaKitVideoPlugin
      web:
