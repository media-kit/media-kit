homepage: https://github.com/media-kit/media-kit
repository: https://github.com/media-kit/media-kit
version: 2.0.0
environment:
  sdk: ^3.6.0
  flutter: ">=3.27.4"
resolution: workspace

topics:
  - video
  - video-player
  - cross-platform
  - media-kit


dependencies:
